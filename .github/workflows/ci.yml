name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      GUARDCLAW_SQLITE_PATH: /tmp/guardclaw-ci.db
      GUARDCLAW_USE_HERMES: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile check
        run: |
          cd backend
          python -m compileall app
      - name: Run tests
        run: |
          cd backend
          python -m pytest -q
      - name: Smoke test simulate endpoint
        run: |
          cd backend
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app

          with TestClient(app) as client:
              response = client.post(
                  "/api/simulate/event",
                  json={"source": "nws", "live": False, "include_camera": True},
              )
              assert response.status_code == 200, response.text
              data = response.json()
              assert data["incident"]["source_kind"] == "nws"
              assert data["camera_signal"]["source"] == "prerecorded_demo"
              assert data["classification"]["level"] in {
                  "minor",
                  "moderate",
                  "major",
                  "life_threatening",
              }
              assert len(data["action_plan"]["outbound_messages"]) >= 1
          PY

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Typecheck
        run: |
          cd frontend
          npm run typecheck
      - name: Build
        run: |
          cd frontend
          npm run build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: |
          cd mobile
          npm ci
      - name: Typecheck
        run: |
          cd mobile
          npx tsc --noEmit
