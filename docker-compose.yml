services:
  backend:
    build:
      context: ./backend
    environment:
      GUARDCLAW_DEMO_MODE: "true"
      GUARDCLAW_SQLITE_PATH: /app/data/guardclaw.db
      GUARDCLAW_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

